<title>Status of Women Summit KZN</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #fff;
    color: #333;
    overflow-x: hidden;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    background: #fff;
    animation: fadeIn 1s ease-in-out;
}

.navbar ul {
    list-style: none;
    display: flex;
    gap: 25px;
}

.navbar a {
    text-decoration: none;
    color: #000;
    font-weight: bold;
    font-size: 14px;
    position: relative;
}

/* Hover underline animation */
.navbar a::after {
    content: '';
    position: absolute;
    width: 0%;
    height: 2px;
    bottom: -5px;
    left: 0;
    background: red;
    transition: 0.3s;
}

.navbar a:hover::after {
    width: 100%;
}

/* HERO SECTION */
.hero {
    height: 90vh;
    background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                url('pic.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    padding: 50px;
    color: #fff;
}

/* Slide animation */
.hero-content {
    max-width: 600px;
    animation: slideUp 1.2s ease-out;
}

.hero h1 {
    font-size: 48px;
    margin-bottom: 20px;
}

.btn {
    display: inline-block;
    padding: 12px 25px;
    background: red;
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    border-radius: 4px;
    transition: 0.3s;
}

/* Button hover animation */
.btn:hover {
    background: #c40000;
    transform: scale(1.05);
}

.event-info {
    margin-top: 20px;
    font-size: 20px;
}

/* SECTION */
.section {
    padding: 60px 50px;
    animation: fadeInUp 1.5s ease;
}

.section h2 {
    margin-bottom: 20px;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes slideUp {
    from {
        transform: translateY(60px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes fadeInUp {
    from {
        transform: translateY(40px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* RESPONSIVE */
@media(max-width: 768px) {
    .navbar {
        flex-direction: column;
        gap: 15px;
    }

    .navbar ul {
        flex-wrap: wrap;
        justify-content: center;
    }

    .hero {
        text-align: center;
        padding: 20px;
    }

    .hero h1 {
        font-size: 32px;
    }
}
</style>

</head>
